<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <title>Produtos</title>
</head>
<body class="bg-dark">
    <div class="container mt-5">
        <h1 class="display-5 mb-4 text-white">Lista de Produtos</h1>
        <div class="alert alert-light" th:if="${#lists.isEmpty(produtos)}">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-info-circle" viewBox="0 0 16 16">
                <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/>
                <path d="m8.93 6.588-2.29.287-.082.38.45.083c.294.07.352.176.288.469l-.738 3.468c-.194.897.105 1.319.808 1.319.545 0 1.178-.252 1.465-.598l.088-.416c-.2.176-.492.246-.686.246-.275 0-.375-.193-.304-.533zM9 4.5a1 1 0 1 1-2 0 1 1 0 0 1 2 0"/>
            </svg>
            Nenhum produto cadastrado ainda
        </div>
        <table class="table table-dark table-striped table-hover" th:unless="${#lists.isEmpty(produtos)}">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Nome</th>
                    <th>Preço</th>
                    <th>Categoria</th>
                    <th>Estoque</th>
                    <th>Descrição</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
             <tr th:each="produto, iterStat:${produtos}">
                 <td th:text="${iterStat.count}">1</td>
                 <td th:text="${produto.nome}">Nome</td>
                 <td th:text="'R$' + ${produto.preco}">0.00</td>
                 <td th:text="${produto.categoria}">Categoria</td>
                 <td th:text="${produto.estoque}">Estoque</td>
                 <td th:text="${produto.descricao}">Descrição</td>
                 <td>
                     <form th:action="@{/lista}" th:object="${produto}" method="post">
                         <button type="submit" class="btn btn-danger btn-sm">Remover</button>
                     </form>
                 </td>
             </tr>
            </tbody>
        </table>
        Total produtos: <span th:text="${#lists.size(produtos)}">0</span> <br>

        <a class="btn btn-primary" href="/cadastrar">Cadastrar</a>
    </div>
</body>
</html>
