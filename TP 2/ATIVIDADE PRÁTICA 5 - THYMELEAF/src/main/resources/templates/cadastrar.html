<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <title>Produtos</title>
</head>
<body class="bg-dark">
    <div class="container mt-5">
        <h1 class="display-5 mb-4 text-white">Cadastrar Produto</h1>

        <div th:if="${erro}" class="alert alert-danger">
            <span th:text="${erro}">erro</span>
        </div>

        <form th:action="@{/cadastrar}" th:object="${produto}" method="post">
            <div class="form-group text-light">
                <label for="nome">Nome</label>
                <input class="form-control bg-dark text-light" type="text" th:field="*{nome}" placeholder="Nome" required>
            </div>
            <div class="form-group text-light">
                <label for="preco">Preço</label>
                <input class="form-control bg-dark text-light" type="number" step="0.01" th:field="*{preco}" required>
            </div>
            <div class="form-group text-light">
                <label for="categoria">Categoria</label>
                <select class="form-select bg-dark text-light" th:field="*{categoria}">
                    <option value="Eletrônico">Eletrônico</option>
                    <option value="Vestuário">Vestuário</option>
                    <option value="Alimento">Alimento</option>
                    <option value="Outros">Outros</option>
                </select>
            </div>
            <div class="form-group text-light">
                <label for="estoque">Estoque</label>
                <input class="form-control bg-dark text-light" type="number" th:field="*{estoque}">
            </div>
            <div class="form-group text-light">
                <label for="descricao">Descrição</label>
                <input class="form-control bg-dark text-light" type="text" placeholder="Descrição" th:field="*{descricao}">
            </div>
            <br> <button type="submit" class="btn btn-primary">Cadastrar</button>
        </form>

        <br> <a href="lista" class="btn btn-link text-white">Ver Lista de Produtos</a>
    </div>
</body>
</html>
